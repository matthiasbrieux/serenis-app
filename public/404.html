<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png"/>
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png"/>
  <link rel="shortcut icon" href="/favicon.ico"/>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png"/>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#3D5A47"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="VPM"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page introuvable — Serenis</title>
  <meta name="robots" content="noindex">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1A1A16;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px 24px;
    }
    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      color: #FDFCF8;
      text-decoration: none;
      margin-bottom: 64px;
      display: block;
    }
    .logo em { color: #C4785A; font-style: normal; }
    .code {
      font-family: 'Cormorant Garamond', serif;
      font-size: 7rem;
      font-weight: 600;
      color: #3D5A47;
      line-height: 1;
      margin-bottom: 16px;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      color: #FDFCF8;
      font-weight: 600;
      margin-bottom: 12px;
    }
    p {
      font-size: 0.95rem;
      color: rgba(253,252,248,.5);
      line-height: 1.7;
      max-width: 400px;
      margin: 0 auto 36px;
    }
    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-primary {
      display: inline-block;
      background: #C4785A;
      color: #fff;
      padding: 13px 28px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.92rem;
      text-decoration: none;
      transition: background .2s;
    }
    .btn-primary:hover { background: #b36a4e; }
    .btn-secondary {
      display: inline-block;
      background: transparent;
      color: rgba(253,252,248,.6);
      padding: 13px 28px;
      border-radius: 10px;
      font-size: 0.92rem;
      text-decoration: none;
      border: 1px solid rgba(253,252,248,.15);
      transition: border-color .2s, color .2s;
    }
    .btn-secondary:hover { color: #FDFCF8; border-color: rgba(253,252,248,.4); }
  </style>
</head>
<body>
  <a href="/" class="logo">Sere<em>nis</em></a>
  <div class="code">404</div>
  <h1>Page introuvable</h1>
  <p>Cette page n'existe pas ou a été déplacée. Pas d'inquiétude — l'essentiel est juste en dessous.</p>
  <div class="actions">
    <a href="/" class="btn-primary">Retour à l'accueil</a>
    <a href="/dashboard" class="btn-secondary">Mon espace vendeur</a>
  </div>
</body>
</html>
