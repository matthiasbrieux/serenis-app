<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Serenis</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="page-auth">
  <div class="auth-box" style="max-width:360px;">
    <h1 style="text-align:center;color:#1A1A16;margin-bottom:8px;">Administration</h1>
    <p class="auth-sub">Accès réservé</p>
    <form id="adminLoginForm">
      <div class="form-group">
        <label>Email admin</label>
        <input type="email" id="adminEmail" required placeholder="matthias@serenis.fr">
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="adminPassword" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn-primary btn-full">Connexion</button>
      <div id="adminError" class="form-error hidden"></div>
    </form>
  </div>
  <script>
    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('adminError');
      err.classList.add('hidden');
      const res = await fetch('/admin/login', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          email: document.getElementById('adminEmail').value,
          password: document.getElementById('adminPassword').value
        })
      });
      const data = await res.json();
      if (data.success) window.location.href = data.redirect;
      else { err.textContent = data.error; err.classList.remove('hidden'); }
    });
  </script>
</body>
</html>
