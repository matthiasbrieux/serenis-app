<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A16"/>
      <stop offset="100%" style="stop-color:#2a2a20"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="#C4785A"/>
  <!-- Logo -->
  <text x="80" y="100" font-family="Georgia,serif" font-size="42" fill="#FDFCF8">Sere<tspan fill="#C4785A">nis</tspan></text>
  <!-- Main headline -->
  <text x="80" y="200" font-family="Georgia,serif" font-size="64" font-weight="bold" fill="#FDFCF8">Vendez sans agence.</text>
  <text x="80" y="270" font-family="Georgia,serif" font-size="64" font-weight="bold" fill="#FDFCF8">Sans commission.</text>
  <!-- Sub -->
  <text x="80" y="340" font-family="Arial,sans-serif" font-size="28" fill="#999">Prix fixe · Numéro dédié · Coach IA · Dossiers automatisés</text>
  <!-- Pack cards -->
  <rect x="80" y="390" width="460" height="160" rx="16" fill="#2a2a24" stroke="#3a3a30" stroke-width="1"/>
  <text x="120" y="435" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#888" letter-spacing="2">PACK AUTONOME</text>
  <text x="120" y="490" font-family="Georgia,serif" font-size="56" font-weight="bold" fill="#FDFCF8">499 €</text>
  <text x="120" y="525" font-family="Arial,sans-serif" font-size="16" fill="#666">TTC · Sans photographe</text>

  <rect x="580" y="390" width="540" height="160" rx="16" fill="#3D5A47"/>
  <text x="620" y="435" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#a8d4b8" letter-spacing="2">PACK SÉRÉNITÉ ⭐ LE PLUS CHOISI</text>
  <text x="620" y="490" font-family="Georgia,serif" font-size="56" font-weight="bold" fill="#FDFCF8">999 €</text>
  <text x="620" y="525" font-family="Arial,sans-serif" font-size="16" fill="rgba(255,255,255,0.6)">TTC · Photographe pro inclus · ou 4× 249 €</text>
  <!-- URL -->
  <text x="80" y="608" font-family="Arial,sans-serif" font-size="18" fill="#555">venduparmo.fr/tarifs</text>
</svg>
