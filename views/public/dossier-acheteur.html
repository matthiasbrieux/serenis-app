<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dossier Acheteur — Vendu Par Moi</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F5F0E8; font-family: 'DM Sans', Arial, sans-serif; color: #1A1A16; min-height: 100vh; }

    .header { background: #3D5A47; padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; color: #fff; }
    .logo em { color: #C4785A; font-style: normal; }
    .header-badge { background: rgba(255,255,255,0.15); color: #D4E4D8; font-size: 0.78rem; padding: 6px 14px; border-radius: 20px; }

    .container { max-width: 900px; margin: 0 auto; padding: 32px 20px 60px; }

    .hero { background: #fff; border-radius: 16px; overflow: hidden; margin-bottom: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .hero-photos { position: relative; height: 340px; background: #e0e0d8; overflow: hidden; cursor: zoom-in; }
    .hero-photos img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.25s; }
    .hero-photos:hover img { transform: scale(1.02); }
    .hero-photos .photo-count { position: absolute; bottom: 12px; right: 16px; background: rgba(0,0,0,0.55); color: #fff; font-size: 0.78rem; padding: 4px 10px; border-radius: 12px; }
    .hero-photos .expand-hint { position: absolute; bottom: 12px; left: 16px; background: rgba(0,0,0,0.55); color: #fff; font-size: 0.76rem; padding: 4px 10px; border-radius: 12px; display: flex; align-items: center; gap: 4px; }
    .photo-categories { background: #f5f5f0; padding: 12px 14px; }
    .photo-cat-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; color: #666; margin-bottom: 7px; margin-top: 14px; }
    .photo-cat-label:first-child { margin-top: 0; }
    .photo-cat-strip { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; }
    .photo-cat-strip img { width: 88px; height: 64px; object-fit: cover; border-radius: 7px; cursor: pointer; opacity: 0.7; transition: opacity 0.2s, box-shadow 0.2s; flex-shrink: 0; }
    .photo-cat-strip img.active, .photo-cat-strip img:hover { opacity: 1; box-shadow: 0 0 0 2px #3D5A47; }

    /* ── Lightbox ── */
    .ph-lb { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; }
    .ph-lb.open { display: flex; }
    .ph-lb-img { max-width: 92vw; max-height: 82vh; object-fit: contain; border-radius: 6px; display: block; }
    .ph-lb-close { position: absolute; top: 18px; right: 22px; background: none; border: none; color: #fff; font-size: 2rem; cursor: pointer; opacity: 0.75; line-height: 1; padding: 0; }
    .ph-lb-close:hover { opacity: 1; }
    .ph-lb-prev, .ph-lb-next { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.12); border: none; color: #fff; font-size: 2rem; padding: 14px 20px; cursor: pointer; border-radius: 8px; transition: 0.15s; line-height: 1; }
    .ph-lb-prev { left: 16px; } .ph-lb-next { right: 16px; }
    .ph-lb-prev:hover, .ph-lb-next:hover { background: rgba(255,255,255,0.25); }
    .ph-lb-count { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.65); font-size: 0.85rem; white-space: nowrap; }
    .ph-lb-strip { position: absolute; bottom: 48px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; max-width: 90vw; overflow-x: auto; padding: 4px; }
    .ph-lb-strip img { width: 56px; height: 40px; object-fit: cover; border-radius: 4px; cursor: pointer; opacity: 0.5; flex-shrink: 0; transition: 0.15s; }
    .ph-lb-strip img.active { opacity: 1; outline: 2px solid #fff; }

    .hero-info { padding: 24px 28px 20px; }
    .prop-type-badge { display: inline-block; background: #e8f4ec; color: #2e7d32; font-size: 0.72rem; font-weight: 600; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
    .prop-title { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; margin-bottom: 6px; }
    .prop-location { color: #666; font-size: 0.95rem; margin-bottom: 16px; }
    .prop-stats { display: flex; gap: 24px; flex-wrap: wrap; }
    .stat { text-align: center; }
    .stat-val { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 600; color: #3D5A47; }
    .stat-lbl { font-size: 0.72rem; color: #999; text-transform: uppercase; letter-spacing: 0.04em; }
    .prop-price { font-family: 'Cormorant Garamond', serif; font-size: 2rem; color: #C4785A; margin-left: auto; }

    .section { background: #fff; border-radius: 16px; padding: 24px 28px; margin-bottom: 20px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
    .section-title { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; color: #1A1A16; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .section-title span { font-size: 1.1rem; }

    .dpe-row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
    .dpe-badge { display: flex; align-items: center; gap: 10px; background: #f0f7f2; border-radius: 10px; padding: 12px 18px; }
    .dpe-letter { width: 44px; height: 44px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: 700; color: #fff; }
    .dpe-info { font-size: 0.82rem; color: #555; }
    .dpe-info strong { display: block; font-size: 1rem; color: #1A1A16; }

    .details-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
    .detail-item { background: #f8f8f5; border-radius: 10px; padding: 12px 16px; }
    .detail-label { font-size: 0.72rem; color: #999; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
    .detail-value { font-size: 0.95rem; font-weight: 500; color: #1A1A16; }

    .doc-list { display: flex; flex-direction: column; gap: 10px; }
    .doc-item { display: flex; align-items: center; gap: 14px; padding: 14px 18px; border: 1px solid #ece8e0; border-radius: 10px; text-decoration: none; color: inherit; transition: background 0.15s, border-color 0.15s; }
    .doc-item:hover { background: #f8f5f0; border-color: #C4785A; }
    .doc-icon { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
    .doc-icon.pdf { background: #fde8e4; }
    .doc-icon.img { background: #e8f4ec; }
    .doc-name { font-size: 0.92rem; font-weight: 500; flex: 1; }
    .doc-folder { font-size: 0.72rem; color: #999; }
    .doc-dl { font-size: 0.8rem; color: #C4785A; font-weight: 600; white-space: nowrap; }

    .folder-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; color: #888; margin: 16px 0 8px; }
    .folder-label:first-child { margin-top: 0; }

    .contact-box { background: linear-gradient(135deg, #3D5A47, #4d6e5a); border-radius: 16px; padding: 28px; color: #fff; text-align: center; }
    .contact-box h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; margin-bottom: 8px; }
    .contact-box p { color: rgba(255,255,255,0.75); font-size: 0.9rem; margin-bottom: 20px; }
    .contact-btn { display: inline-block; background: #C4785A; color: #fff; padding: 13px 28px; border-radius: 10px; text-decoration: none; font-weight: 600; font-size: 0.95rem; margin: 4px; }
    .contact-btn.outline { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); }

    .empty-docs { text-align: center; padding: 32px; color: #aaa; font-size: 0.9rem; }

    /* ── Pièces ── */
    .rooms-level { margin-bottom: 18px; }
    .rooms-level-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; color: #3D5A47; background: #e8f4ec; display: inline-block; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
    .rooms-table { width: 100%; border-collapse: collapse; }
    .rooms-table tr { border-bottom: 1px solid #f0ece4; }
    .rooms-table tr:last-child { border-bottom: none; }
    .rooms-table td { padding: 8px 4px; font-size: 0.9rem; }
    .rooms-table td:first-child { color: #1A1A16; font-weight: 500; padding-left: 0; }
    .rooms-table td:last-child { text-align: right; color: #3D5A47; font-weight: 600; white-space: nowrap; font-variant-numeric: tabular-nums; }
    .rooms-total-row { display: flex; justify-content: space-between; align-items: center; background: #f5f0e8; border-radius: 10px; padding: 10px 14px; margin-top: 14px; font-size: 0.88rem; font-weight: 600; color: #1A1A16; }

    .loading { text-align: center; padding: 80px 20px; }
    .loading-spinner { width: 40px; height: 40px; border: 3px solid #e0e0d8; border-top-color: #3D5A47; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box { text-align: center; padding: 80px 20px; }
    .error-box h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; color: #3D5A47; margin-bottom: 12px; }
    .error-box p { color: #888; }

    .footer { text-align: center; padding: 32px 20px; font-size: 0.78rem; color: #aaa; }

    /* ── Booking ── */
    .visit-cta { background: linear-gradient(135deg, #3D5A47, #4d6e5a); border-radius: 16px; padding: 28px; color: #fff; margin-bottom: 20px; transition: opacity 0.3s; }
    .visit-cta.hidden { opacity: 0; pointer-events: none; height: 0; padding: 0; margin: 0; overflow: hidden; }
    .visit-cta h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; margin-bottom: 8px; }
    .visit-cta p { color: rgba(255,255,255,0.78); font-size: 0.9rem; margin-bottom: 20px; }
    .visit-open-btn { background: #C4785A; color: #fff; border: none; padding: 14px 30px; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.2s; }
    .visit-open-btn:hover { background: #b3684a; }

    .booking-panel { background: #fff; border-radius: 16px; padding: 28px; margin-bottom: 20px; box-shadow: 0 2px 16px rgba(0,0,0,0.10); display: none; animation: fadeSlideIn 0.3s ease; }
    .booking-panel.open { display: block; }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* Progress stepper */
    .booking-progress { display: flex; align-items: center; gap: 0; margin-bottom: 24px; }
    .bp-step { display: flex; align-items: center; gap: 8px; flex: 1; }
    .bp-dot { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #d0e8d4; background: #f0f7f2; color: #aaa; font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.25s; }
    .bp-dot.active { background: #3D5A47; border-color: #3D5A47; color: #fff; }
    .bp-dot.done { background: #C4785A; border-color: #C4785A; color: #fff; }
    .bp-label { font-size: 0.72rem; color: #aaa; font-weight: 500; transition: color 0.25s; }
    .bp-label.active { color: #3D5A47; font-weight: 600; }
    .bp-line { flex: 1; height: 2px; background: #e8e0d6; margin: 0 6px; transition: background 0.25s; }
    .bp-line.done { background: #C4785A; }

    .booking-step { display: none; }
    .booking-step.active { display: block; animation: fadeSlideIn 0.2s ease; }
    .step-title { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; color: #3D5A47; margin-bottom: 16px; }

    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .cal-nav { background: none; border: 1px solid #ddd; border-radius: 8px; width: 36px; height: 36px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; }
    .cal-nav:hover { background: #f5f0e8; }
    .cal-month-label { font-weight: 600; font-size: 0.95rem; color: #1A1A16; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
    .cal-day-name { text-align: center; font-size: 0.7rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; padding-bottom: 4px; font-weight: 600; }
    .cal-day { border: none; border-radius: 10px; padding: 10px 4px; font-family: inherit; font-size: 0.88rem; cursor: pointer; text-align: center; transition: background 0.15s, color 0.15s; min-height: 52px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; }
    .cal-day.empty { background: transparent; pointer-events: none; }
    .cal-day.past { background: #f5f5f0; color: #ccc; pointer-events: none; }
    .cal-day.no-slot { background: #f5f5f0; color: #bbb; pointer-events: none; }
    .cal-day.available { background: #e8f4ec; color: #2e7d32; font-weight: 600; }
    .cal-day.available:hover { background: #c8e6c9; }
    .cal-day.selected { background: #3D5A47; color: #fff; }
    .cal-day .dot { width: 5px; height: 5px; border-radius: 50%; background: #3D5A47; }
    .cal-day.selected .dot { background: rgba(255,255,255,0.6); }

    .time-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
    .time-btn { border: 1.5px solid #d0e8d4; background: #f0f7f2; color: #2e7d32; border-radius: 10px; padding: 10px 18px; font-family: inherit; font-size: 0.92rem; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .time-btn:hover { background: #c8e6c9; border-color: #3D5A47; }
    .time-btn.selected { background: #3D5A47; color: #fff; border-color: #3D5A47; }
    .time-back { background: none; border: none; color: #888; cursor: pointer; font-size: 0.85rem; font-family: inherit; margin-bottom: 12px; padding: 0; }
    .time-back:hover { color: #3D5A47; }

    .booking-form-grid { display: flex; flex-direction: column; gap: 12px; margin-top: 12px; }
    .bform-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .bform-field label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.04em; display: block; margin-bottom: 5px; font-weight: 600; }
    .bform-field input { width: 100%; border: 1.5px solid #e0dbd0; border-radius: 10px; padding: 11px 14px; font-family: inherit; font-size: 0.95rem; color: #1A1A16; background: #fafaf7; transition: border-color 0.15s; }
    .bform-field input:focus { outline: none; border-color: #3D5A47; }
    .bform-recap { background: #f0f7f2; border-radius: 10px; padding: 14px 16px; font-size: 0.9rem; color: #2e7d32; font-weight: 500; margin-top: 4px; }
    .bform-submit { width: 100%; background: #C4785A; color: #fff; border: none; padding: 15px; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 4px; transition: background 0.2s; }
    .bform-submit:hover { background: #b3684a; }
    .bform-submit:disabled { background: #ccc; cursor: not-allowed; }

    .booking-success { text-align: center; padding: 36px 20px 28px; }
    .booking-success .icon { font-size: 3.2rem; margin-bottom: 14px; animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275); }
    @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .booking-success h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; color: #3D5A47; margin-bottom: 10px; }
    .booking-success p { color: #666; font-size: 0.9rem; line-height: 1.6; }
    .booking-success .success-tag { display: inline-block; background: #e8f4ec; color: #2e7d32; font-size: 0.75rem; font-weight: 700; padding: 4px 12px; border-radius: 20px; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.05em; }
    .no-slots-msg { text-align: center; padding: 28px; color: #aaa; font-size: 0.9rem; }

    @media (max-width: 500px) { .bform-row { grid-template-columns: 1fr; } }

    @media (max-width: 600px) {
      .header { padding: 16px 20px; }
      .container { padding: 20px 12px 48px; }
      .hero-photos { height: 220px; }
      .hero-info { padding: 18px 20px 16px; }
      .prop-title { font-size: 1.4rem; }
      .prop-stats { gap: 16px; }
      .section { padding: 18px 18px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">Vendu Par <em>Moi</em></div>
  <div class="header-badge">📁 Dossier Acheteur</div>
</div>

<div class="container">
  <div id="loading" class="loading">
    <div class="loading-spinner"></div>
    <p style="color:#888;">Chargement du dossier...</p>
  </div>
  <div id="content" style="display:none;"></div>
  <div id="error" class="error-box" style="display:none;">
    <h2>Dossier introuvable</h2>
    <p>Ce lien est invalide ou l'annonce n'est plus disponible.</p>
  </div>
</div>

<div class="footer">Vendu Par Moi · Vente immobilière entre particuliers · contact@venduparmo.fr</div>

<script>
const token = location.pathname.split('/').pop();
let currentPhotoIdx = 0;
let photos = [];

const DPE_COLORS = { A:'#00a651', B:'#57b947', C:'#8dc63f', D:'#f7ec13', E:'#fbaf3f', F:'#f15a24', G:'#ed1c24' };
const CATEGORY_LABELS = { pro: '📸 Photos professionnelles', exterieur: '🏡 Extérieur & façade', decouverte: '🏠 Photos découverte', details: '🔍 Photos des détails' };
const CATEGORY_ORDER = ['pro', 'exterieur', 'decouverte', 'details'];

async function load() {
  try {
    const r = await fetch(`/api/dossier/acheteur/${token}`);
    if (!r.ok) throw new Error();
    const { property: p, photos: ph, documents: docs } = await r.json();
    photos = ph;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    render(p, ph, docs);
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
  }
}

function render(p, ph, docs) {
  const typeLabels = { maison:'Maison', appartement:'Appartement', terrain:'Terrain', immeuble:'Immeuble', local:'Local commercial' };
  const typeLabel = typeLabels[p.type] || p.type || 'Bien';
  const price = p.price ? Number(p.price).toLocaleString('fr-FR') + ' €' : 'Prix sur demande';

  const diagDocs = docs.filter(d => !d.folder || d.folder === 'diagnostics');
  const acheteurDocs = docs.filter(d => d.folder === 'acheteur_serieux');

  const mainPhoto = ph.length
    ? `<img id="mainPhoto" src="${ph[0].url}" alt="Photo principale" onclick="lbOpen(currentPhotoIdx)" onerror="this.style.display='none';document.getElementById('noPhotoPlaceholder').style.display='flex';">`
    : `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#aaa;">Aucune photo</div>`;

  // Group photos by category
  const byCategory = {};
  ph.forEach(img => {
    const cat = img.category || 'pro';
    if (!byCategory[cat]) byCategory[cat] = [];
    byCategory[cat].push(img);
  });
  const orderedCats = [...CATEGORY_ORDER, ...Object.keys(byCategory).filter(c => !CATEGORY_ORDER.includes(c))].filter(c => byCategory[c] && byCategory[c].length);

  let photoStrip = '';
  if (ph.length > 1) {
    const catSections = orderedCats.map(cat => {
      const imgs = byCategory[cat];
      const label = CATEGORY_LABELS[cat] || cat;
      const thumbs = imgs.map(img => {
        const idx = ph.indexOf(img);
        return `<img src="${img.thumbnail_url || img.url}" class="${idx===0?'active':''}" onclick="lbOpen(${idx})" alt="" onerror="this.style.display='none'">`;
      }).join('');
      return `<div class="photo-cat-label photo-cat-section">${label}</div><div class="photo-cat-strip photo-cat-section">${thumbs}</div>`;
    }).join('');
    photoStrip = `<div class="photo-categories">${catSections}</div>`;
  }

  // Init lightbox strip after DOM render + clean up broken images
  setTimeout(function() {
    const strip = document.getElementById('phLbStrip');
    if (strip) strip.innerHTML = lbBuildStrip();

    // After a short delay, hide category sections where all images failed to load
    setTimeout(function() {
      document.querySelectorAll('.photo-cat-strip').forEach(function(strip) {
        var imgs = strip.querySelectorAll('img');
        var allHidden = imgs.length > 0 && Array.from(imgs).every(function(img) { return img.style.display === 'none'; });
        if (allHidden) {
          strip.style.display = 'none';
          var prev = strip.previousElementSibling;
          if (prev && prev.classList.contains('photo-cat-section')) prev.style.display = 'none';
        }
      });
      // If main photo failed, try first working photo
      var mainImg = document.getElementById('mainPhoto');
      if (mainImg && mainImg.style.display === 'none') {
        for (var i = 1; i < photos.length; i++) {
          if (photos[i] && photos[i].url) {
            var testImg = new Image();
            testImg.onload = (function(url) { return function() {
              var m = document.getElementById('mainPhoto');
              if (m) { m.src = url; m.style.display = ''; document.getElementById('noPhotoPlaceholder').style.display = 'none'; }
            }; })(photos[i].url);
            testImg.src = photos[i].url;
            break;
          }
        }
      }
    }, 1500);
  }, 0);

  const dpeHtml = p.dpe_class ? `
    <div class="dpe-row">
      <div class="dpe-badge">
        <div class="dpe-letter" style="background:${DPE_COLORS[p.dpe_class]||'#999'}">${p.dpe_class}</div>
        <div class="dpe-info"><strong>DPE ${p.dpe_class}</strong>${p.dpe_conso_energie ? p.dpe_conso_energie + ' kWh/m²/an' : ''}</div>
      </div>

// ── Booking ──────────────────────────────────────────────────
let agendaSlots = [], agendaBooked = [];
let calWeekOffset = 0;
let selectedDate = null, selectedTime = null;

async function openBooking() {
  document.getElementById('visitCta').classList.add('hidden');
  document.getElementById('bookingPanel').classList.add('open');
  if (!agendaSlots.length && agendaBooked !== null) await loadAgenda();
  buildCalendar();
  setTimeout(() => document.getElementById('bookingPanel').scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
}

async function loadAgenda() {
  try {
    const r = await fetch(`/api/dossier/acheteur/${token}/creneaux`);
    const data = await r.json();
    agendaSlots = data.slots || [];
    agendaBooked = data.booked || [];
    if (!agendaSlots.length) {
      document.getElementById('calGrid').innerHTML = '<div class="no-slots-msg" style="grid-column:1/-1">Le vendeur n\'a pas encore renseigné ses disponibilités.<br>Contactez-le directement par téléphone.</div>';
    }
  } catch(e) { agendaSlots = []; agendaBooked = []; }
}

function getTimeSlotsForDay(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const dow = d.getDay();
  const matching = agendaSlots.filter(s => s.is_recurring ? s.day_of_week === dow : s.specific_date === dateStr);
  const taken = new Set(agendaBooked.filter(b => b.visit_date === dateStr).map(b => b.visit_time));
  const times = [];
  matching.forEach(slot => {
    let [h, m] = slot.start_time.split(':').map(Number);
    const [eh, em] = slot.end_time.split(':').map(Number);
    const endMins = eh * 60 + em;
    while (h * 60 + m < endMins) {
      const t = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
      if (!taken.has(t)) times.push(t);
      m += 30; if (m >= 60) { m -= 60; h++; }
    }
  });
  return [...new Set(times)].sort();
}

function buildCalendar() {
  const today = new Date(); today.setHours(0,0,0,0);
  const start = new Date(today); start.setDate(today.getDate() + calWeekOffset * 7);
  // align to Monday
  const dow0 = start.getDay(); // 0=Sun
  const diffToMon = dow0 === 0 ? -6 : 1 - dow0;
  start.setDate(start.getDate() + diffToMon);

  const DAY_NAMES = ['Lu','Ma','Me','Je','Ve','Sa','Di'];
  const MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

  // Month label: show month of midpoint
  const mid = new Date(start); mid.setDate(start.getDate() + 10);
  document.getElementById('calMonthLabel').textContent = MONTHS[mid.getMonth()] + ' ' + mid.getFullYear();

  let html = DAY_NAMES.map(n => `<div class="cal-day-name">${n}</div>`).join('');
  for (let i = 0; i < 28; i++) {
    const d = new Date(start); d.setDate(start.getDate() + i);
    const dateStr = d.toISOString().split('T')[0];
    const isPast = d < today;
    const slots = isPast ? [] : getTimeSlotsForDay(dateStr);
    const hasSlots = slots.length > 0;
    const isSelected = dateStr === selectedDate;
    let cls = 'cal-day';
    if (isPast) cls += ' past';
    else if (!hasSlots) cls += ' no-slot';
    else cls += ' available';
    if (isSelected) cls += ' selected';
    const dot = hasSlots && !isPast ? '<div class="dot"></div>' : '';
    html += `<button class="${cls}" onclick="selectDay('${dateStr}')">${d.getDate()}${dot}</button>`;
  }
  document.getElementById('calGrid').innerHTML = html;
}

function shiftWeek(dir) {
  calWeekOffset += dir;
  buildCalendar();
}

function selectDay(dateStr) {
  selectedDate = dateStr;
  const times = getTimeSlotsForDay(dateStr);
  if (!times.length) return;

  const [y, m, d] = dateStr.split('-');
  const DAYS = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
  const MONTHS = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  const label = DAYS[new Date(dateStr+'T12:00:00').getDay()] + ' ' + parseInt(d) + ' ' + MONTHS[parseInt(m)-1] + ' ' + y;

  document.getElementById('stepTimeTitle').textContent = '2. Horaires disponibles — ' + label;
  document.getElementById('timeGrid').innerHTML = times.map(t =>
    `<button class="time-btn${t===selectedTime?' selected':''}" onclick="selectSlot('${t}')">${t}</button>`
  ).join('');

  showStep('stepTime');
  buildCalendar();
}

function selectSlot(time) {
  selectedTime = time;
  document.querySelectorAll('.time-btn').forEach(b => b.classList.toggle('selected', b.textContent === time));
  const [y, m, d] = selectedDate.split('-');
  const DAYS = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
  const MONTHS = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  const label = DAYS[new Date(selectedDate+'T12:00:00').getDay()] + ' ' + parseInt(d) + ' ' + MONTHS[parseInt(m)-1] + ' ' + y;
  document.getElementById('bformRecap').textContent = '📅 ' + label + ' à ' + time;
  showStep('stepForm');
}

function backToCalendar() { showStep('stepCalendar'); }
function backToTime() { showStep('stepTime'); }

function showStep(id) {
  ['stepCalendar','stepTime','stepForm','stepSuccess'].forEach(s => {
    document.getElementById(s).classList.toggle('active', s === id);
  });
  // Update progress stepper
  const stepMap = { stepCalendar:1, stepTime:2, stepForm:3, stepSuccess:4 };
  const cur = stepMap[id] || 1;
  for (let i = 1; i <= 3; i++) {
    const dot = document.getElementById('bpd'+i);
    const lbl = document.getElementById('bpl'+i);
    if (i < cur) { dot.className = 'bp-dot done'; dot.textContent = '✓'; }
    else if (i === cur) { dot.className = 'bp-dot active'; dot.textContent = i; }
    else { dot.className = 'bp-dot'; dot.textContent = i; }
    lbl.className = 'bp-label' + (i === cur ? ' active' : '');
    if (i < 3) {
      document.getElementById('bpline'+i).className = 'bp-line' + (i < cur ? ' done' : '');
    }
  }
  // Hide progress on success
  document.getElementById('bookingProgress').style.display = id === 'stepSuccess' ? 'none' : 'flex';
  document.getElementById('bookingPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

async function submitBooking() {
  const firstName = document.getElementById('bfFirstName').value.trim();
  const lastName = document.getElementById('bfLastName').value.trim();
  const email = document.getElementById('bfEmail').value.trim();
  const phone = document.getElementById('bfPhone').value.trim();
  if (!firstName || !lastName || !email || !phone) { alert('Tous les champs sont obligatoires.'); return; }
  const name = firstName + ' ' + lastName;

  const btn = document.getElementById('bfSubmit');
  btn.disabled = true; btn.textContent = 'Envoi en cours...';

  try {
    const r = await fetch(`/api/dossier/acheteur/${token}/reserver`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ buyer_name: name, buyer_email: email, buyer_phone: phone, visit_date: selectedDate, visit_time: selectedTime })
    });
    const data = await r.json();
    if (data.error) { alert(data.error); btn.disabled = false; btn.textContent = 'Confirmer ma visite'; return; }

    const [y, mo, d] = selectedDate.split('-');
    const DAYS = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
    const MONTHS = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
    const label = DAYS[new Date(selectedDate+'T12:00:00').getDay()] + ' ' + parseInt(d) + ' ' + MONTHS[parseInt(mo)-1] + ' ' + y;
    document.getElementById('successMsg').innerHTML = `Votre demande de visite pour le <strong>${label} à ${selectedTime}</strong> a bien été transmise au propriétaire.`;
    document.getElementById('successMsgSub').innerHTML = `Le propriétaire vous contactera très prochainement pour vous confirmer cette dernière et répondre à vos éventuelles questions.<br><br><span style="font-size:0.8rem;color:#bbb;">Un email récapitulatif a été envoyé à <strong>${email}</strong>.</span>`;
    showStep('stepSuccess');
  } catch(e) {
    alert('Erreur réseau, réessayez.');
    btn.disabled = false; btn.textContent = 'Confirmer ma visite';
  }
}

function setPhoto(idx) {
  currentPhotoIdx = idx;
  const main = document.getElementById('mainPhoto');
  if (main && photos[idx]) main.src = photos[idx].url;
  document.querySelectorAll('.photo-cat-strip img').forEach((img, i) => {
    img.classList.toggle('active', i === idx);
  });
}

// ── Lightbox ──────────────────────────────────────────
let _lbIdx = 0;
function lbOpen(idx) {
  if (!photos.length) return;
  _lbIdx = (idx || 0);
  lbRender();
  document.getElementById('phLb').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function lbClose() {
  document.getElementById('phLb').classList.remove('open');
  document.body.style.overflow = '';
}
function lbMove(dir) {
  _lbIdx = (_lbIdx + dir + photos.length) % photos.length;
  lbRender();
}
function lbRender() {
  const ph = photos[_lbIdx];
  if (!ph) return;
  document.getElementById('phLbImg').src = ph.url;
  document.getElementById('phLbCount').textContent = (_lbIdx + 1) + ' / ' + photos.length;
  document.querySelectorAll('.ph-lb-strip img').forEach((el, i) => el.classList.toggle('active', i === _lbIdx));
  const activeThumb = document.querySelector('.ph-lb-strip img.active');
  if (activeThumb) activeThumb.scrollIntoView({ inline: 'center', behavior: 'smooth', block: 'nearest' });
}
function lbBuildStrip() {
  if (photos.length <= 1) return '';
  return photos.map((ph, i) =>
    `<img src="${ph.thumbnail_url || ph.url}" class="${i===0?'active':''}" onclick="event.stopPropagation();_lbIdx=${i};lbRender()" alt="">`
  ).join('');
}
document.addEventListener('keydown', function(e) {
  const lb = document.getElementById('phLb');
  if (!lb || !lb.classList.contains('open')) return;
  if (e.key === 'Escape') lbClose();
  if (e.key === 'ArrowLeft') lbMove(-1);
  if (e.key === 'ArrowRight') lbMove(1);
});

load();
</script>

<div class="ph-lb" id="phLb" onclick="if(event.target===this)lbClose()">
  <button class="ph-lb-close" onclick="lbClose()">✕</button>
  <img class="ph-lb-img" id="phLbImg" src="" alt="">
  <button class="ph-lb-prev" onclick="event.stopPropagation();lbMove(-1)">‹</button>
  <button class="ph-lb-next" onclick="event.stopPropagation();lbMove(1)">›</button>
  <div class="ph-lb-count" id="phLbCount"></div>
  <div class="ph-lb-strip" id="phLbStrip"></div>
</div>
