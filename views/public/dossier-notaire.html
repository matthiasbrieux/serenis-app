<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.ico" sizes="any"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png"/>
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png"/>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#3D5A47"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="VPM"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dossier Notaire — Serenis</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f0f0ed; font-family: 'DM Sans', Arial, sans-serif; color: #1A1A16; min-height: 100vh; }

    .header { background: #1A1A16; padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; color: #fff; }
    .logo em { color: #C4785A; font-style: normal; }
    .header-badge { background: rgba(196,120,90,0.2); color: #C4785A; font-size: 0.78rem; padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(196,120,90,0.3); }

    .container { max-width: 960px; margin: 0 auto; padding: 32px 20px 60px; }

    .intro-banner { background: #fff; border-radius: 12px; padding: 20px 24px; margin-bottom: 24px; border-left: 4px solid #C4785A; display: flex; gap: 14px; align-items: flex-start; }
    .intro-banner .icon { font-size: 1.5rem; flex-shrink: 0; margin-top: 2px; }
    .intro-banner h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; margin-bottom: 4px; }
    .intro-banner p { font-size: 0.85rem; color: #666; line-height: 1.5; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .card { background: #fff; border-radius: 14px; padding: 22px 24px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
    .card-title { font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

    .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0ed; font-size: 0.88rem; }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: #888; }
    .info-value { font-weight: 500; text-align: right; max-width: 60%; }

    .seller-card { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
    .seller-avatar { width: 52px; height: 52px; border-radius: 50%; background: #3D5A47; color: #fff; display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; flex-shrink: 0; }
    .seller-name { font-weight: 600; font-size: 1rem; }
    .seller-contact { font-size: 0.85rem; color: #666; }
    .contact-link { color: #C4785A; text-decoration: none; display: block; }
    .contact-link:hover { text-decoration: underline; }

    .doc-section { background: #fff; border-radius: 14px; padding: 22px 24px; margin-bottom: 20px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
    .folder-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 2px solid #f0f0ed; }
    .folder-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
    .folder-title { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; }
    .folder-count { font-size: 0.72rem; color: #aaa; margin-left: auto; }

    .doc-list { display: flex; flex-direction: column; gap: 8px; }
    .doc-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border: 1px solid #ece8e0; border-radius: 10px; text-decoration: none; color: inherit; transition: all 0.15s; }
    .doc-item:hover { background: #f8f5f0; border-color: #C4785A; }
    .doc-icon { width: 38px; height: 38px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; background: #fde8e4; }
    .doc-icon.img { background: #e8f4ec; }
    .doc-name { font-size: 0.9rem; font-weight: 500; flex: 1; }
    .doc-type { font-size: 0.72rem; color: #999; margin-top: 2px; }
    .doc-dl { font-size: 0.8rem; color: #C4785A; font-weight: 600; white-space: nowrap; }

    .empty-folder { text-align: center; padding: 24px; color: #bbb; font-size: 0.88rem; }

    .offer-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .offer-table th { text-align: left; padding: 8px 12px; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; color: #aaa; border-bottom: 2px solid #f0f0ed; }
    .offer-table td { padding: 10px 12px; border-bottom: 1px solid #f5f5f2; }
    .offer-table tr:last-child td { border-bottom: none; }
    .status-badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; }
    .status-accepted { background: #e8f4ec; color: #2e7d32; }
    .status-pending { background: #fff3e0; color: #e65100; }
    .status-refused { background: #fde8e4; color: #c62828; }

    .print-btn { position: fixed; bottom: 24px; right: 24px; background: #1A1A16; color: #fff; border: none; padding: 12px 20px; border-radius: 10px; font-size: 0.88rem; cursor: pointer; font-family: inherit; box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
    .print-btn:hover { background: #333; }

    .loading { text-align: center; padding: 80px 20px; }
    .loading-spinner { width: 40px; height: 40px; border: 3px solid #e0e0d8; border-top-color: #1A1A16; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box { text-align: center; padding: 80px 20px; }
    .error-box h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; margin-bottom: 12px; }
    .error-box p { color: #888; }

    .footer { text-align: center; padding: 32px 20px; font-size: 0.78rem; color: #aaa; }
    .confidential { background: #fef3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 10px 16px; font-size: 0.82rem; color: #856404; margin-bottom: 24px; }

    @media (max-width: 640px) {
      .grid-2 { grid-template-columns: 1fr; }
      .header { padding: 16px 20px; }
      .container { padding: 20px 12px 60px; }
    }
    @media print {
      .print-btn { display: none; }
      body { background: #fff; }
      .card, .doc-section { box-shadow: none; border: 1px solid #ddd; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">Sere<em>nis</em></div>
  <div class="header-badge">⚖️ Dossier Notaire — Confidentiel</div>
</div>

<div class="container">
  <div id="loading" class="loading">
    <div class="loading-spinner"></div>
    <p style="color:#888;">Chargement du dossier...</p>
  </div>
  <div id="content" style="display:none;"></div>
  <div id="error" class="error-box" style="display:none;">
    <h2>Dossier introuvable</h2>
    <p>Ce lien est invalide ou a expiré. Contactez le vendeur ou Serenis.</p>
  </div>
</div>

<button class="print-btn" onclick="window.print()">🖨️ Imprimer / PDF</button>
<div class="footer">Serenis · Document confidentiel réservé au notaire · contact@serenis.fr</div>

<script>
const token = location.pathname.split('/').pop();

const DPE_COLORS = { A:'#00a651', B:'#57b947', C:'#8dc63f', D:'#f7ec13', E:'#fbaf3f', F:'#f15a24', G:'#ed1c24' };

const DIAG_TYPES = {
  dpe:            { icon: '🛡️', label: 'DPE',               desc: 'Diagnostic de performance énergétique' },
  amiante:        { icon: '🧪', label: 'Amiante',            desc: 'Diagnostic amiante' },
  plomb:          { icon: '🔬', label: 'Plomb (CREP)',       desc: "Constat de risque d'exposition au plomb" },
  electricite:    { icon: '⚡', label: 'Électricité',        desc: 'Diagnostic installation électrique' },
  gaz:            { icon: '🔥', label: 'Gaz',                desc: 'Diagnostic installation gaz' },
  erp:            { icon: '⚠️', label: 'ERP',                desc: 'État des risques et pollutions' },
  assainissement: { icon: '💧', label: 'Assainissement',     desc: "État de l'installation d'assainissement" },
  termites:       { icon: '🪲', label: 'Termites',           desc: 'Diagnostic termites' },
  loi_carrez:     { icon: '📐', label: 'Loi Carrez',         desc: 'Mesurage Loi Carrez' },
};

async function load() {
  try {
    const r = await fetch(`/api/dossier/notaire/${token}`);
    if (!r.ok) throw new Error();
    const data = await r.json();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    render(data);
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
  }
}

function render({ property: p, photos, documents: docs, offers }) {
  const typeLabels = { maison:'Maison', appartement:'Appartement', terrain:'Terrain', immeuble:'Immeuble', local:'Local commercial' };
  const price = p.price ? Number(p.price).toLocaleString('fr-FR') + ' €' : 'N/A';
  const initials = ((p.first_name||'')[0]||'') + ((p.last_name||'')[0]||'');

  function docHtml(doc, diagMeta) {
    const ext = (doc.name || '').split('.').pop().toLowerCase();
    const isPdf = ext === 'pdf';
    return `<a href="${doc.url}" target="_blank" class="doc-item">
      <div class="doc-icon ${isPdf?'':'img'}">${isPdf?'📄':'🖼️'}</div>
      <div style="flex:1;">
        <div class="doc-name">${doc.name || (diagMeta ? diagMeta.label : doc.doc_type) || 'Document'}</div>
        ${diagMeta ? `<div class="doc-type">${diagMeta.desc}</div>` : doc.doc_type ? `<div class="doc-type">${doc.doc_type}</div>` : ''}
      </div>
      <div class="doc-dl">Télécharger →</div>
    </a>`;
  }

  // ── Diagnostics : affichage par type ──
  const diagDocs = docs.filter(d => !d.folder || d.folder === 'diagnostics');
  const acheteurDocs = docs.filter(d => d.folder === 'acheteur_serieux');
  const notaireDocs = docs.filter(d => d.folder === 'notaire');
  const entretienDocs = docs.filter(d => d.folder === 'entretien');
  const autreDocs = docs.filter(d => d.folder && !['diagnostics','acheteur_serieux','notaire','entretien'].includes(d.folder));

  // Groupe les diags par type connu, puis "autres"
  const diagKnownOrder = ['dpe','amiante','plomb','electricite','gaz','erp','assainissement','termites','loi_carrez'];
  const diagByType = {};
  diagDocs.forEach(d => {
    const t = d.doc_type || 'autre';
    if (!diagByType[t]) diagByType[t] = [];
    diagByType[t].push(d);
  });

  function diagRowHtml(type) {
    const meta = DIAG_TYPES[type];
    const typeDocs = diagByType[type] || [];
    const found = typeDocs.length > 0;
    return `<div style="display:flex;align-items:center;gap:12px;padding:12px 16px;border:1px solid ${found?'#ece8e0':'#f0f0ed'};border-radius:10px;background:${found?'#fff':'#fafaf8'};">
      <div style="width:40px;height:40px;border-radius:9px;background:${found?'#e8f4ec':'#f5f5f2'};display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;">${meta.icon}</div>
      <div style="flex:1;">
        <div style="font-weight:600;font-size:0.9rem;color:${found?'#1A1A16':'#bbb'};">${meta.label}</div>
        <div style="font-size:0.75rem;color:#aaa;">${meta.desc}</div>
      </div>
      ${found
        ? typeDocs.map(d => `<a href="${d.url}" target="_blank" style="font-size:0.8rem;color:#C4785A;font-weight:600;white-space:nowrap;text-decoration:none;">📥 Télécharger</a>`).join('')
        : `<span style="font-size:0.75rem;color:#ccc;">Non fourni</span>`}
    </div>`;
  }

  const otherDiagDocs = diagDocs.filter(d => d.doc_type && !diagKnownOrder.includes(d.doc_type));

  const diagSection = `<div class="doc-section">
    <div class="folder-header">
      <div class="folder-icon" style="background:#3D5A4720;">📋</div>
      <div class="folder-title">Diagnostics techniques</div>
      <div class="folder-count">${diagDocs.length} fichier${diagDocs.length>1?'s':''}</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      ${diagKnownOrder.map(diagRowHtml).join('')}
      ${otherDiagDocs.length ? `<div style="margin-top:4px;">${otherDiagDocs.map(d=>docHtml(d,null)).join('')}</div>` : ''}
    </div>
  </div>`;

  function simpleSection(icon, label, fdocs, iconBg) {
    return `<div class="doc-section">
      <div class="folder-header">
        <div class="folder-icon" style="background:${iconBg}20;">${icon}</div>
        <div class="folder-title">${label}</div>
        <div class="folder-count">${fdocs.length} fichier${fdocs.length>1?'s':''}</div>
      </div>
      ${fdocs.length
        ? `<div class="doc-list">${fdocs.map(d=>docHtml(d,null)).join('')}</div>`
        : `<div class="empty-folder">Aucun document dans ce dossier</div>`}
    </div>`;
  }

  const offersHtml = offers && offers.length ? `
    <div class="card" style="margin-bottom:20px;">
      <div class="card-title">💰 Offres reçues</div>
      <table class="offer-table">
        <thead><tr><th>Montant</th><th>Acheteur</th><th>Date</th><th>Statut</th></tr></thead>
        <tbody>${offers.map(o => `<tr>
          <td><strong>${Number(o.amount).toLocaleString('fr-FR')} €</strong></td>
          <td>${o.buyer_name || '—'}</td>
          <td>${new Date(o.created_at).toLocaleDateString('fr-FR')}</td>
          <td><span class="status-badge ${o.status==='accepted'?'status-accepted':o.status==='refused'?'status-refused':'status-pending'}">${o.status==='accepted'?'Acceptée':o.status==='refused'?'Refusée':'En cours'}</span></td>
        </tr>`).join('')}</tbody>
      </table>
    </div>` : '';

  document.getElementById('content').innerHTML = `
    <div class="confidential">🔒 Document confidentiel · Destiné exclusivement au notaire en charge de la transaction · Ne pas diffuser</div>

    <div class="intro-banner">
      <div class="icon">⚖️</div>
      <div>
        <h2>Dossier complet — ${typeLabels[p.type]||p.type||'Bien'} à ${p.city || ''}</h2>
        <p>Ce dossier contient l'ensemble des documents et informations nécessaires à la rédaction des actes. Généré par la plateforme Serenis le ${new Date().toLocaleDateString('fr-FR')}.</p>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title">🏠 Bien immobilier</div>
        <div class="info-row"><span class="info-label">Type</span><span class="info-value">${typeLabels[p.type]||p.type||'—'}</span></div>
        <div class="info-row"><span class="info-label">Adresse</span><span class="info-value">${p.address||'—'}</span></div>
        <div class="info-row"><span class="info-label">Ville</span><span class="info-value">${p.city||'—'} ${p.postal_code||''}</span></div>
        <div class="info-row"><span class="info-label">Surface habitable</span><span class="info-value">${p.surface_habitable?p.surface_habitable+' m²':'—'}</span></div>
        ${p.surface_terrain ? `<div class="info-row"><span class="info-label">Terrain</span><span class="info-value">${p.surface_terrain} m²</span></div>` : ''}
        <div class="info-row"><span class="info-label">Pièces / Chambres</span><span class="info-value">${p.rooms||'—'} p. / ${p.bedrooms||'—'} ch.</span></div>
        <div class="info-row"><span class="info-label">Année construction</span><span class="info-value">${p.year_built||'—'}</span></div>
        <div class="info-row"><span class="info-label">DPE</span><span class="info-value" style="color:${DPE_COLORS[p.dpe_class]||'inherit'};font-weight:700;">${p.dpe_class||'—'}</span></div>
        <div class="info-row"><span class="info-label">Prix de vente</span><span class="info-value" style="color:#C4785A;font-weight:700;font-size:1.05rem;">${price}</span></div>
        ${p.taxe_fonciere ? `<div class="info-row"><span class="info-label">Taxe foncière</span><span class="info-value">${Number(p.taxe_fonciere).toLocaleString('fr-FR')} €/an</span></div>` : ''}
        ${p.charges_copro ? `<div class="info-row"><span class="info-label">Charges copro</span><span class="info-value">${Number(p.charges_copro).toLocaleString('fr-FR')} €/an</span></div>` : ''}
        ${p.assainissement_type ? `<div class="info-row"><span class="info-label">Assainissement</span><span class="info-value">${p.assainissement_type}</span></div>` : ''}
        ${p.heating_type ? `<div class="info-row"><span class="info-label">Chauffage</span><span class="info-value">${p.heating_type}</span></div>` : ''}
      </div>

      <div class="card">
        <div class="card-title">👤 Vendeur</div>
        <div class="seller-card">
          <div class="seller-avatar">${initials}</div>
          <div>
            <div class="seller-name">${p.first_name||''} ${p.last_name||''}</div>
            <div class="seller-contact">Vendeur Serenis</div>
          </div>
        </div>
        ${p.seller_email ? `<div class="info-row"><span class="info-label">Email</span><span class="info-value"><a href="mailto:${p.seller_email}" class="contact-link">${p.seller_email}</a></span></div>` : ''}
        ${p.seller_phone ? `<div class="info-row"><span class="info-label">Téléphone</span><span class="info-value"><a href="tel:${p.seller_phone}" class="contact-link">${p.seller_phone}</a></span></div>` : ''}
        ${p.contrat_signe_at ? `<div class="info-row"><span class="info-label">Contrat signé le</span><span class="info-value">${new Date(p.contrat_signe_at).toLocaleDateString('fr-FR')}</span></div>` : ''}
        ${photos.length ? `<div style="margin-top:14px;"><div style="font-size:0.72rem;color:#aaa;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:8px;">${photos.length} photo${photos.length>1?'s':''}</div><div style="display:flex;gap:6px;flex-wrap:wrap;">${photos.slice(0,6).map(ph=>`<img src="${ph.thumbnail_url||ph.url}" style="width:64px;height:48px;object-fit:cover;border-radius:6px;">`).join('')}</div></div>` : ''}
      </div>
    </div>

    ${offersHtml}

    ${diagSection}
    ${simpleSection('🔑', 'Dossier Acheteur — Documents transmis', acheteurDocs, '#1a73e8')}
    ${notaireDocs.length ? simpleSection('⚖️', 'Documents Notaire', notaireDocs, '#6a1b9a') : ''}
    ${entretienDocs.length ? simpleSection('🔧', 'Entretien & Maintenance', entretienDocs, '#e65100') : ''}
    ${autreDocs.length ? simpleSection('📂', 'Autres documents', autreDocs, '#999') : ''}
  `;
}

load();
</script>
</body>
</html>
