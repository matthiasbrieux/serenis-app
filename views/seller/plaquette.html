<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plaquette de formation — Vendu Par Moi</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark: #1C2E22;
      --green: #3D5A47;
      --green-light: #EDF5F0;
      --green-border: #C8DDD0;
      --terra: #C4785A;
      --cream: #F8F5F0;
      --text: #1a1a1a;
      --text-muted: #555;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text);
      font-size: 14px;
      line-height: 1.65;
    }

    /* ── PRINT BUTTON ── */
    .print-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 999;
      background: var(--green-dark); color: #fff;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 28px; gap: 16px;
    }
    .print-bar-left { font-size: 0.82rem; color: rgba(212,228,216,0.7); }
    .print-bar-title { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; color: #F5F0E8; }
    .btn-print {
      background: var(--terra); color: #fff; border: none;
      border-radius: 8px; padding: 9px 22px; font-size: 0.85rem;
      font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.02em; display: flex; align-items: center; gap: 7px;
    }
    .btn-print:hover { background: #b56747; }

    /* ── LAYOUT ── */
    .plaquette { max-width: 840px; margin: 0 auto; padding: 80px 32px 60px; }

    /* ── COVER ── */
    .cover {
      background: linear-gradient(160deg, var(--green-dark) 0%, #2d4535 100%);
      border-radius: 20px; padding: 56px 52px 52px;
      margin-bottom: 48px; position: relative; overflow: hidden;
    }
    .cover::before {
      content: ''; position: absolute; top: -60px; right: -60px;
      width: 280px; height: 280px; border-radius: 50%;
      background: rgba(255,255,255,0.03);
    }
    .cover-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(168,212,181,0.12); border: 1px solid rgba(168,212,181,0.25);
      border-radius: 100px; padding: 4px 14px;
      font-size: 0.62rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: #A8D4B5; margin-bottom: 28px;
    }
    .cover-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.8rem; font-weight: 600; color: #F5F0E8;
      line-height: 1.15; margin-bottom: 16px;
    }
    .cover-sub {
      font-size: 0.95rem; color: rgba(212,228,216,0.75);
      line-height: 1.65; max-width: 480px; margin-bottom: 40px;
    }
    .cover-stats {
      display: flex; gap: 32px; flex-wrap: wrap;
    }
    .cover-stat-n { font-size: 1.6rem; font-weight: 700; color: #6BBF82; line-height: 1; }
    .cover-stat-l { font-size: 0.72rem; color: rgba(212,228,216,0.55); margin-top: 3px; }

    /* ── MODULE HEADER ── */
    .module-wrap { margin-bottom: 48px; page-break-inside: avoid; }
    .module-header {
      background: linear-gradient(135deg, var(--green-dark) 0%, #2a4035 100%);
      border-radius: 14px 14px 0 0; padding: 24px 28px;
      display: flex; align-items: flex-start; gap: 18px;
    }
    .module-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.6rem; color: rgba(168,212,181,0.35); font-weight: 600;
      line-height: 1; flex-shrink: 0; margin-top: 2px;
    }
    .module-titles { flex: 1; }
    .module-phase {
      font-size: 0.58rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--terra); margin-bottom: 5px;
    }
    .module-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.55rem; color: #F5F0E8; font-weight: 600; line-height: 1.2;
      margin-bottom: 6px;
    }
    .module-subtitle { font-size: 0.82rem; color: rgba(212,228,216,0.65); line-height: 1.5; }

    .module-body {
      background: #fff; border: 1.5px solid #E8E3DB;
      border-top: none; border-radius: 0 0 14px 14px; padding: 24px 28px;
    }

    /* ── KEY POINTS ── */
    .kp-label {
      font-size: 0.58rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--green); margin-bottom: 12px;
    }
    .kp-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 24px; }
    .kp-item {
      display: flex; align-items: flex-start; gap: 10px;
      font-size: 0.83rem; color: var(--text); line-height: 1.55;
    }
    .kp-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green); flex-shrink: 0; margin-top: 6px;
    }

    /* ── STEP ── */
    .step-wrap {
      border-left: 3px solid var(--green-border);
      padding-left: 20px; margin-bottom: 28px;
      page-break-inside: avoid;
    }
    .step-title {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--green); margin-bottom: 8px;
      display: flex; align-items: center; gap: 8px;
    }
    .step-meta { font-size: 0.62rem; color: #aaa; font-weight: 400; }
    .step-speak {
      font-size: 0.88rem; color: var(--text-muted); line-height: 1.7;
      margin-bottom: 10px;
    }

    /* ── TIPS / WARNINGS ── */
    .tip-list, .warn-list { display: flex; flex-direction: column; gap: 5px; margin-top: 8px; }
    .tip-item {
      background: var(--green-light); border-left: 2px solid var(--green);
      border-radius: 0 6px 6px 0; padding: 6px 10px;
      font-size: 0.78rem; color: #2d5035; line-height: 1.5;
    }
    .warn-item {
      background: #FFF5F0; border-left: 2px solid var(--terra);
      border-radius: 0 6px 6px 0; padding: 6px 10px;
      font-size: 0.78rem; color: #7a3a20; line-height: 1.5;
    }
    .tip-label, .warn-label {
      font-size: 0.58rem; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; margin-bottom: 4px;
    }
    .tip-label { color: var(--green); }
    .warn-label { color: var(--terra); }

    /* ── TABLE ── */
    .p-table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 0.8rem; }
    .p-table th {
      background: var(--green); color: #fff;
      padding: 6px 10px; text-align: left; font-weight: 600; font-size: 0.72rem;
    }
    .p-table td {
      padding: 6px 10px; border-bottom: 1px solid #EEE;
      vertical-align: top; line-height: 1.5;
    }
    .p-table tr:nth-child(even) td { background: #FAFAF8; }

    /* ── SCRIPT / DIALOGUE ── */
    .script-wrap { background: #F4F6F4; border-radius: 10px; padding: 14px 16px; margin: 8px 0; }
    .script-label {
      font-size: 0.58rem; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: #888; margin-bottom: 10px;
    }
    .script-line { display: flex; gap: 8px; margin-bottom: 7px; font-size: 0.82rem; line-height: 1.5; }
    .script-who {
      font-size: 0.62rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em; white-space: nowrap; margin-top: 1px; min-width: 60px;
    }
    .script-who.v { color: var(--green); }
    .script-who.a { color: var(--terra); }

    /* ── DIVIDER ── */
    .section-div {
      border: none; border-top: 1.5px dashed #DDD6CC;
      margin: 32px 0;
    }

    /* ── MAIL SECTION ── */
    .mail-section { margin-bottom: 48px; }
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem; color: var(--green-dark); margin-bottom: 6px;
    }
    .section-desc { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 24px; }
    .mail-cat { margin-bottom: 28px; }
    .mail-cat-title {
      font-size: 0.62rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--green);
      border-bottom: 1.5px solid var(--green-border);
      padding-bottom: 7px; margin-bottom: 14px;
    }
    .mail-card {
      background: #fff; border: 1.5px solid #E8E3DB; border-radius: 10px;
      padding: 14px 16px; margin-bottom: 10px; page-break-inside: avoid;
    }
    .mail-title { font-weight: 700; font-size: 0.82rem; color: var(--green-dark); margin-bottom: 8px; }
    .mail-body {
      font-size: 0.78rem; color: var(--text-muted); line-height: 1.8;
      white-space: pre-wrap; font-family: 'DM Sans', sans-serif;
    }

    /* ── CHECKLIST SECTION ── */
    .ck-section { margin-bottom: 36px; }
    .ck-title { font-weight: 700; font-size: 0.88rem; color: var(--green-dark); margin-bottom: 10px; }
    .ck-items { display: flex; flex-direction: column; gap: 4px; }
    .ck-item {
      display: flex; align-items: center; gap: 10px;
      font-size: 0.82rem; color: var(--text-muted); line-height: 1.45;
    }
    .ck-box {
      width: 16px; height: 16px; border-radius: 4px;
      border: 1.5px solid var(--green-border); flex-shrink: 0;
    }

    /* ── PRINT STYLES ── */
    @media print {
      .print-bar { display: none; }
      body { background: #fff; font-size: 11pt; }
      .plaquette { padding: 0; max-width: 100%; }
      .cover { border-radius: 0; page-break-after: always; print-color-adjust: exact; -webkit-print-color-adjust: exact; }
      .module-wrap { page-break-before: always; }
      .module-header { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
      .tip-item { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
      .warn-item { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
      .p-table th { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
      .section-div { page-break-before: always; margin: 0; border: none; }
      .mail-section, .ck-section { page-break-inside: avoid; }
    }
  </style>
</head>
<body>

<div class="print-bar">
  <div>
    <div class="print-bar-title">Vendu Par Moi</div>
    <div class="print-bar-left">Plaquette de formation — usage interne</div>
  </div>
  <button class="btn-print" onclick="window.print()">

function renderTable(table) {
  let html = `<table class="p-table"><thead><tr>${table.headers.map(h => `<th>${h}</th>`).join('')}</tr></thead><tbody>`;
  table.rows.forEach(row => { html += `<tr>${row.map(c => `<td>${c}</td>`).join('')}</tr>`; });
  return html + '</tbody></table>';
}

function renderScript(script) {
  let html = `<div class="script-wrap"><div class="script-label">Script de dialogue</div>`;
  script.forEach(s => {
    html += `<div class="script-line"><span class="script-who ${s.who}">${s.who === 'v' ? 'Vendeur' : 'Acheteur'}</span><span>${s.line}</span></div>`;
  });
  return html + '</div>';
}

    html += `<div class="mail-cat"><div class="mail-cat-title">${cat}</div>`;
    mails.forEach(m => {
      html += `<div class="mail-card"><div class="mail-title">${m.title}</div><div class="mail-body">${m.body}</div></div>`;
    });
    html += '</div>';
  });

  html += '</div>';

  // Checklists
  html += `<hr class="section-div">
  <div class="mail-section">
    <div class="section-title">Check-lists</div>
    <div class="section-desc">À cocher avant chaque étape clé.</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">`;

  CHECKLISTS.forEach(ck => {
    html += `<div class="ck-section">
      <div class="ck-title">${ck.title}</div>
      <div class="ck-items">${ck.items.map(i => `<div class="ck-item"><div class="ck-box"></div><span>${i}</span></div>`).join('')}</div>
    </div>`;
  });

  html += '</div></div>';

  root.innerHTML = html;
}

const JOURS = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];

function formatSlots(slots) {
  if (!slots || !slots.length) return '[Vos disponibilités]';
  return slots.map(s => {
    const label = s.is_recurring
      ? JOURS[s.day_of_week]
      : (s.specific_date ? new Date(s.specific_date + 'T00:00:00').toLocaleDateString('fr-FR', { day: 'numeric', month: 'long' }) : '');
    return label + ' de ' + s.start_time + ' à ' + s.end_time;
  }).join('\n');
}

function fillAuto(body, sd) {
  return body
    .replace('[__adresse__]', sd.adresse)
    .replace('[__lien_dossier__]', sd.lienDossier)
    .replace('[__disponibilites__]', sd.disponibilites)
    .replace('[__prenom_nom__]', sd.prenomNom)
    .replace('[__telephone__]', sd.telephone)
    .replace('[__lien_compromis__]', sd.lienCompromis)
    .replace('[__lien_notaire__]', sd.lienNotaire);
}

async function init() {
  let sd = { adresse: '[adresse]', lienDossier: '[Lien dossier / diagnostics]', disponibilites: '[Vos disponibilités]', prenomNom: '[Prénom Nom]' };
  try {
    const [meRes, agendaRes] = await Promise.all([fetch('/api/me'), fetch('/api/agenda')]);
    const me = await meRes.json();
    const agenda = await agendaRes.json();
    const p = me.property || {};
    const s = me.seller || me;
    const base = window.location.origin;
    sd.adresse = [p.address, p.city].filter(Boolean).join(', ') || '[adresse]';
    sd.lienDossier = p.acheteur_token ? base + '/dossier/acheteur/' + p.acheteur_token : '[Lien dossier / diagnostics]';
    sd.disponibilites = formatSlots(agenda.slots);
    sd.prenomNom = [s.first_name, s.last_name].filter(Boolean).join(' ') || '[Prénom Nom]';
    sd.telephone = s.phone || '[Téléphone]';
    sd.lienCompromis = window.location.origin + '/downloads/compromis-elements.html';
    sd.lienNotaire = p.notaire_token ? window.location.origin + '/dossier/notaire/' + p.notaire_token : '[Lien dossier notaire]';
  } catch(e) {}

  // Patch MAILS avant render
  MAILS['Avant visite'][0].body = fillAuto(MAILS['Avant visite'][0].body, sd);
  MAILS['Avant visite'][1].body = fillAuto(MAILS['Avant visite'][1].body, sd);
  MAILS['Offres'][0].body = fillAuto(MAILS['Offres'][0].body, sd);
  MAILS['Offres'][1].body = fillAuto(MAILS['Offres'][1].body, sd);
  MAILS['Offres'][2].body = fillAuto(MAILS['Offres'][2].body, sd);
  MAILS['Offres'][3].body = fillAuto(MAILS['Offres'][3].body, sd);
  MAILS['Offres'][4].body = fillAuto(MAILS['Offres'][4].body, sd);
  MAILS['Offres'][5].body = fillAuto(MAILS['Offres'][5].body, sd);
  MAILS['Offres'][6].body = fillAuto(MAILS['Offres'][6].body, sd);
  MAILS['Notaire'][1].body = fillAuto(MAILS['Notaire'][1].body, sd);

  render();
}

init();
</script>
